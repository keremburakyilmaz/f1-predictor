stages:
  fetch:
    cmd: python -m f1predictor.data.fetch --params params.yaml
    deps:
      - src/f1predictor/data/fetch.py
      - src/f1predictor/data/fastf1_loader.py
      - src/f1predictor/data/openf1_client.py
      - src/f1predictor/data/schedule.py
      - params.yaml
    outs:
      - data/raw

  process:
    cmd: python -m f1predictor.features.build --params params.yaml
    deps:
      - data/raw
      - params.yaml
    outs:
      - data/processed/features.parquet

  train:
    cmd: python -m f1predictor.models.train --params params.yaml
    deps:
      - data/processed/features.parquet
      - params.yaml
    outs:
      - models/champion
      - metrics/eval.json
